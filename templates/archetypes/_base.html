<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoatDaily</title>
<style>
    @font-face {
        font-family: 'Inter';
        font-weight: 400;
        src: url('{{ font_regular_uri }}') format('truetype');
    }
    @font-face {
        font-family: 'Inter';
        font-weight: 700;
        src: url('{{ font_bold_uri }}') format('truetype');
    }
    @font-face {
        font-family: 'Inter';
        font-weight: 900;
        src: url('{{ font_black_uri }}') format('truetype');
    }

    :root {
        --bg: {{ colors.background }};
        --bg-alt: {{ colors.background_gradient }};
        --accent: {{ colors.accent }};
        --accent-light: {{ colors.accent_light }};
        --text-primary: {{ colors.text_primary }};
        --text-secondary: {{ colors.text_secondary }};
        --highlight: {{ components.highlight_span_color }};
        --brand-line: {{ components.brand_line_color }};
        --panel-bg: {{ panel_bg }};
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        width: {{ width }}px;
        height: {{ height }}px;
        background: var(--bg);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        position: relative;
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
    }

    /* Accent touch #1 - bold + soft violet emphasis inside the headline */
    .highlight {
        color: var(--highlight);
        font-weight: 700;
    }

    /*
      Reserved-panel composition: the photo zone (top) and the text panel
      (bottom) are two separate boxes that never overlap. A real photo's
      subject stays inside .photo-zone; the headline stays inside .panel.
    */
    .photo-zone {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: {{ photo_zone_h }}px;
        overflow: hidden;
        background: var(--bg);
        z-index: 0;
    }
    .hero-photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .hero-cutout {
        /* height:100% + object-fit:contain (not just max-height) so a small sourced
           cutout scales UP to fill the zone instead of floating tiny in empty space */
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 92%;
        height: 96%;
        object-fit: contain;
        object-position: bottom;
        filter: drop-shadow(0px 20px 40px rgba(0,0,0,0.85));
    }
    .glow-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 35%, rgba(139,92,246,0.18) 0%, rgba(5,5,5,0) 65%);
    }
    .feather {
        /* blends the photo zone into the panel - drawn last so it sits above the photo/cutout/glow */
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: {{ feather_px }}px;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--panel-bg) 100%);
    }

    .panel {
        position: absolute;
        left: 0;
        top: {{ photo_zone_h }}px;
        width: 100%;
        height: {{ panel_h }}px;
        background: var(--panel-bg);
        z-index: 2;
        padding: 64px 80px 48px;
        display: flex;
        flex-direction: column;
    }

    .top-brand {
        position: absolute;
        top: 56px;
        right: 80px;
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 3px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.65);
        z-index: 3;
    }

    .brand-bar {
        margin-top: auto;
    }
    .brand-line {
        width: {{ components.brand_line_width }};
        height: 3px;
        background: var(--brand-line);
        border-radius: 2px;
        margin-bottom: 22px;
    }
    .brand-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
    }
    .brand-name {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 3px;
    }
    .brand-handle {
        font-size: 22px;
        font-weight: 400;
        color: var(--text-secondary);
        letter-spacing: 0.5px;
    }

    {% block extra_style %}{% endblock %}
</style>
</head>
<body>

<div class="top-brand">{{ brand.name }}</div>

{% block content %}{% endblock %}

<div class="panel">
    {% block panel_content %}{% endblock %}
    <div class="brand-bar">
        <div class="brand-line"></div>
        <div class="brand-row">
            {% block brand_row %}
            <div class="brand-handle">{{ brand.handle }}</div>
            {% endblock %}
        </div>
    </div>
</div>

</body>
</html>
