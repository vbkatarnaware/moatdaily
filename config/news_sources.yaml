# Filtering weights for India relevance scoring
relevance_signals:
  india_keywords:
    high: ["India", "Indian", "Bengaluru", "Mumbai", "Delhi", "Hyderabad", "crore", "lakh", "rupee", "₹", "SEBI", "RBI", "UPI", "Aadhaar", "Shark Tank India", "IPO BSE", "NSE", "Sensex", "Nifty"]
    medium: ["Asia", "emerging market", "Global South", "BRICS", "Southeast Asia"]
  skip_keywords: ["local election", "county", "state legislature", "NFL", "NBA", "MLB", "Premier League"]

  engagement_signals:
    high: ["funding", "acquisition", "IPO", "layoff", "controversy", "ban", "launch", "rebrand", "vs", "billion", "million", "record", "first ever", "broke", "surpass"]
    medium: ["partnership", "expansion", "hiring", "report", "update", "feature"]
