# News Sources Configuration
# Discovery layers, all free / no key required for the primary two:
#   1. Google News search RSS (google_news_queries below) - Google's own India news
#      ranking, per-vertical query buckets, closest thing to "a human googling every morning"
#   2. Publisher RSS feeds (rss_feeds below) - trusted, curated sources
#   3. Currents API (optional) - used only if a key is configured in settings.yaml

api:
  currents:
    base_url: "https://api.currentsapi.services/v1"
    endpoints:
      latest: "/latest-news"
      search: "/search"
    default_params:
      language: "en"
      country: "IN"
    categories:
      - technology
      - business
      - startup
      - ai

# Google News search RSS, bucketed per vertical so all four get guaranteed
# coverage every run (AI used to only leak in via tech feeds + keyword bonus).
# URL pattern: news.google.com/rss/search?q=<query>+when:1d&hl=en-IN&gl=IN&ceid=IN:en
google_news_queries:
  startup:
    - "Indian startup funding"
    - "Indian startup"
    - "Shark Tank India"
    - "India unicorn"
    - "seed round India"
  business:
    - "SEBI"
    - "RBI"
    - "Sensex Nifty"
    - "India IPO"
    - "India acquisition"
    - "Indian economy"
  tech:
    - "India tech"
    - "smartphone launch India"
    - "India IT sector"
    - "gadget launch India"
  ai:
    - "India AI"
    - "OpenAI"
    - "ChatGPT Gemini"
    - "Nvidia AI"
    - "AI startup India"

