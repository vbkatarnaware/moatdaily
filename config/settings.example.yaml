# MoatDaily Settings - EXAMPLE
# Copy this to settings.yaml and fill in real values. settings.yaml is gitignored
# and must never be committed.

news:
  currents_api_key: ""       # optional - Google News RSS + publisher RSS work without it
  brave_api_key: ""          # optional - used as an image-search fallback
  max_articles_per_fetch: 30
  max_age_hours: 24          # drop any article older than this (or with no parseable date)
  categories:
    - technology
    - business
    - startup
    - ai

sheets:
  spreadsheet_id: ""
  credentials_path: "credentials/gcp-service-account.json"  # relative to repo root (portable across hosts) or an absolute path
  worksheet_name: "Posts"

instagram:
  access_token: ""           # long-lived token, leave blank to keep publishing inert
  ig_user_id: ""              # Instagram Business/Creator account id
  app_id: ""                  # Meta app id - for scripts/refresh_ig_token.py (mint a long-lived token)
  app_secret: ""              # Meta app secret - same; keep secret
  public_base_url: ""        # public URL serving the rendered posts (Graph API fetches media by URL, not raw bytes)
  # Optional: how rendered images reach the host serving public_base_url at
  # publish time. Omit entirely if the machine running publish already writes
  # into the served directory. ssh_target "" means "this same host" (local copy).
  host_upload:
    ssh_target: ""            # ssh alias/host that serves public_base_url ("" = same host)
    remote_dir: ""            # directory on that host mapped to public_base_url, e.g. /srv/moatdaily-posts

posting:
  daily_post_count: 4  # 3-6 range, start with 4
  post_types:
    - static
    - carousel
  retry_limit: 3

output:
  posts_dir: "output/posts"
  data_dir: "data"
