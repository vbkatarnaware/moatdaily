# Build the MoatDaily pipeline image and push it to GHCR on every push to main.
#
# Builds linux/amd64 (the EC2 target arch; local dev on Apple Silicon is arm64,
# so the registry image is the canonical one for the server).
#
# Auto-deploy to EC2 (docker pull on the box) is intentionally NOT wired up yet:
# deploys today are a manual `ssh` + `docker pull` + `docker image prune -f`
# (see README.md "Deploy"), with a cron-scheduled prune (scripts/docker_prune.sh)
# and disk-space tripwire (scripts/check_disk_space.sh) as a safety net against
# stale image buildup - added after a full day of missed posting slots on
# 2026-07-07 when 9 stale untagged images filled the disk and crashed the cron
# scheduler. Once there's appetite for it, add a deploy job here that SSHes in
# with a restricted deploy key and runs `docker pull`.
name: Build and publish image

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "templates/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - "config/settings.example.yaml"
      - "config/brand.yaml"
      - "config/news_sources.yaml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/vbkatarnaware/moatdaily:latest
            ghcr.io/vbkatarnaware/moatdaily:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
